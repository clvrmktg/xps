{{- $clarityID := getenv "CLARITY_PROJECT_ID" -}}
{{- if and (eq hugo.Environment "production") $clarityID -}}
{{- $version := .GitInfo.Hash | default (now.Unix) -}}
<script>
  function loadClarity() {
    (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src=i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "/.netlify/functions/clarity?v={{ $version }}");
  }

  if ('requestIdleCallback' in window) {
    requestIdleCallback(loadClarity, { timeout: 5000 });
  } else {
    setTimeout(loadClarity, 3000);
  }
</script>
{{- end -}}
